# lint, typecheck, and test are all blocking gates and genuinely pass.
# The test gate downloads Xenova/all-MiniLM-L6-v2 once (serially, cached) before
# running vitest, which avoids the concurrent partial-download race that used to
# flake the suite with "Protobuf parsing failed" (EMBEDDING_ERROR).
name: CI
on:
  push:
    branches: [main, master]
  pull_request: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the embedding model across runs (keyed on the predownload script).
      - name: Cache embedding model
        if: matrix.gate == 'test'
        uses: actions/cache@v4
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: hf-model-${{ runner.os }}-${{ hashFiles('scripts/predownload-model.mjs') }}
      # Populate + validate the model cache once, serially, before parallel tests.
      - name: Pre-download embedding model
        if: matrix.gate == 'test'
        run: npm run predownload-model
      - run: npm run ${{ matrix.gate }}
