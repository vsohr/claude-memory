# test is a blocking gate and genuinely passes: it downloads
# Xenova/all-MiniLM-L6-v2 once (serially, cached) before running vitest, which
# avoids the concurrent partial-download race that used to flake the suite with
# "Protobuf parsing failed" (EMBEDDING_ERROR).
# lint + typecheck are INFORMATIONAL (continue-on-error) because of PRE-EXISTING
# debt unrelated to this CI work: `npm run lint` has no ESLint config file at all
# (the script was never functional), and `npm run typecheck` surfaces ~15
# long-standing TS errors (unused imports + a few real type/call-site mismatches
# in src/cli and src/server). Add an eslint config / fix the type errors, then
# drop the conditional below to make them blocking.
name: CI
on:
  push:
    branches: [main, master]
  pull_request: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.gate != 'test' }}
    strategy:
      fail-fast: false
      matrix:
        gate: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the embedding model across runs (keyed on the predownload script).
      - name: Cache embedding model
        if: matrix.gate == 'test'
        uses: actions/cache@v4
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: hf-model-${{ runner.os }}-${{ hashFiles('scripts/predownload-model.mjs') }}
      # Populate + validate the model cache once, serially, before parallel tests.
      - name: Pre-download embedding model
        if: matrix.gate == 'test'
        run: npm run predownload-model
      - run: npm run ${{ matrix.gate }}
